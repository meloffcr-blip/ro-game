<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمسكني لو تقدر - رحمة ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="custom-cursor"></div>
  <div id="cursor-trail"></div>
    <div class="container">
        <a href="../index.html" class="back-btn">← العودة للرئيسية</a>
        <h1>🏃♂️ أمسكني لو تقدر!</h1>
        
        <div class="game-info">
            <p>حاولي تمسكي محمد قبل ما الوقت يخلص!</p>
            <button id="start-catch-game-btn" class="game-btn">ابدأ اللعبة</button>
        </div>
        
        <div id="catch-me-game" class="hidden">
            <div id="game-ui">
                <div>النقاط: <span id="game-score">0</span></div>
                <div>الوقت: <span id="game-timer">15</span></div>
            </div>
            <div id="game-area">
                <div id="mohamed-target">
                    <img src="../assets/images/mohamed.jpg" alt="محمد">
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/catch-me.js"></script>
  <script>
    const _c=document.getElementById("custom-cursor"),_t=document.getElementById("cursor-trail");let _mx=-100,_my=-100,_tx=-100,_ty=-100;document.addEventListener("mousemove",e=>{_mx=e.clientX;_my=e.clientY;_c.style.left=_mx+"px";_c.style.top=_my+"px";});(function a(){_tx+=(_mx-_tx)*.14;_ty+=(_my-_ty)*.14;_t.style.left=_tx+"px";_t.style.top=_ty+"px";requestAnimationFrame(a);})();document.querySelectorAll("a,button").forEach(e=>{e.addEventListener("mouseenter",()=>{_c.style.width="26px";_c.style.height="26px";_t.style.width="52px";_t.style.height="52px";});e.addEventListener("mouseleave",()=>{_c.style.width="18px";_c.style.height="18px";_t.style.width="36px";_t.style.height="36px";});});
  </script>
</body>
</html>
