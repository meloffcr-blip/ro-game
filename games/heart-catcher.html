<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صائد القلوب - رحمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Aref+Ruqaa:wght@400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/heart-catcher.css">
</head>

<body>

    <div id="cur-dot"></div>
    <div id="cur-ring"></div>

    <div id="game-wrap">

        <!-- ══ MENU ══ -->
        <div id="menu">
            <span class="logo-heart">💖</span>
            <h1>صائد القلوب</h1>
            <p class="sub">لعبة مخصصة لرحمة من محمد ❤️</p>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">أعلى نقاط</span><span class="stat-value" id="best-score">0</span></div>
                <div class="stat-card"><span class="stat-label">أعلى مستوى</span><span class="stat-value" id="best-level">1</span></div>
                <div class="stat-card"><span class="stat-label">عدد الجولات</span><span class="stat-value" id="total-games">0</span></div>
                <div class="stat-card"><span class="stat-label">آخر لعبة</span><span class="stat-value" id="last-played">-</span></div>
            </div>
            <div class="rules">
                <h3>🎯 قواعد اللعب</h3>
                <div class="rule-row"><span>❤️</span><span>قلب عادي = نقطة</span></div>
                <div class="rule-row"><span>💖</span><span>قلب ملون = 3 نقاط</span></div>
                <div class="rule-row"><span>⭐</span><span>نجمة = بونص خاص</span></div>
                <div class="rule-row"><span>🔥</span><span>كومبو ×5 = مضاعفة</span></div>
            </div>
            <button class="start-btn" id="start-btn">🎮 ابدأ اللعبة</button>
            <a href="../index.html" class="back-link">← الرئيسية</a>
        </div>

        <!-- ══ GAME ══ -->
        <div id="game-screen" style="display:none;position:absolute;inset:0;">
            <div id="hud">
                <div class="hud-side">
                    <div class="hud-pill">🏆 <span id="score">0</span></div>
                    <div class="hud-pill">🎯 <span id="level">1</span></div>
                </div>
                <div id="timer-ring"><span id="timer">30</span></div>
                <div class="hud-side">
                    <div class="hud-pill" id="combo-pill">🔥 <span id="combo">0</span></div>
                    <button id="pause-btn">⏸️</button>
                </div>
            </div>
            <div id="arena"></div>
            <div id="prog-wrap">
                <div id="prog-label">المستوى التالي</div>
                <div id="prog-track">
                    <div id="prog-fill"></div>
                </div>
            </div>
            <div id="touch-hint">👆 المسي القلوب قبل ما تطير!</div>
        </div>

        <!-- ══ PAUSE ══ -->
        <div id="pause-overlay" style="display:none;">
            <div id="pause-box">
                <h2>⏸️ متوقف</h2>
                <p>النقاط: <strong id="p-score">0</strong></p>
                <p>المستوى: <strong id="p-level">1</strong></p>
                <p>الكومبو: <strong id="p-combo">0</strong></p>
                <div class="pbtn-row">
                    <button class="pbtn" id="resume-btn">▶️ متابعة</button>
                    <button class="pbtn" id="restart-btn">🔄 إعادة</button>
                    <button class="pbtn ghost" id="quit-btn">🚪 خروج</button>
                </div>
            </div>
        </div>

    </div>

    <script src="../assets/js/heart-catcher.js"></script>

</body>

</html>
