<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 صائد القلوب - رحمة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Aref+Ruqaa:wght@400;700&family=Dancing+Script:wght@600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rose: #e8556d;
            --rose-lt: #f7a3b0;
            --rose-deep: #c03558;
            --ink: #2a1218;
            --muted: #9e6472;
            --shine: rgba(255, 255, 255, .72);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(ellipse 100% 70% at 20% 0%, #ffd6e0 0%, transparent 55%),
                radial-gradient(ellipse 80% 60% at 80% 100%, #ffe4ec 0%, transparent 50%),
                linear-gradient(160deg, #fff0f5 0%, #fce8ec 50%, #fff6f8 100%);
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(ellipse 3px 9px at 12% 18%, rgba(255, 255, 255, .6) 0%, transparent 100%),
                radial-gradient(ellipse 2px 6px at 68% 14%, rgba(255, 255, 255, .55) 0%, transparent 100%),
                radial-gradient(ellipse 4px 13px at 45% 78%, rgba(255, 255, 255, .6) 0%, transparent 100%),
                radial-gradient(ellipse 2px 7px at 84% 52%, rgba(255, 255, 255, .5) 0%, transparent 100%);
            opacity: .38;
            animation: dropDrift 18s ease-in-out infinite alternate;
        }

        @keyframes dropDrift {
            from {
                transform: translateY(0)
            }

            to {
                transform: translateY(-14px)
            }
        }

        /* ─ CURSOR ─ */
        #cur-dot {
            position: fixed;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--rose-lt) 50%, var(--rose) 100%);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px rgba(232, 85, 109, .25), 0 2px 12px rgba(232, 85, 109, .5), inset 0 1px 3px rgba(255, 255, 255, .8);
            transition: width .15s, height .15s;
            left: -100px;
            top: -100px;
        }

        #cur-ring {
            position: fixed;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            border: 1.5px solid rgba(232, 85, 109, .4);
            transform: translate(-50%, -50%);
            transition: left .1s ease, top .1s ease, width .25s, height .25s, border-color .25s;
            left: -100px;
            top: -100px;
        }

        #cur-dot.attract {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--rose) 55%, var(--rose-deep) 100%);
            box-shadow: 0 0 0 3px rgba(232, 85, 109, .35), 0 4px 22px rgba(232, 85, 109, .8), 0 0 32px rgba(232, 85, 109, .42);
        }

        #cur-ring.attract {
            width: 60px;
            height: 60px;
            border-color: rgba(232, 85, 109, .68);
            border-width: 2px;
        }

        @media(hover:none) {

            #cur-dot,
            #cur-ring {
                display: none
            }
        }

        /* ─ LAYOUT ─ */
        #game-wrap {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ─ MENU ─ */
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 460px;
            padding: 34px 26px;
            text-align: center;
            z-index: 10;
            background: rgba(255, 240, 245, .32);
            backdrop-filter: blur(26px) saturate(1.8);
            -webkit-backdrop-filter: blur(26px) saturate(1.8);
            border: 1px solid rgba(255, 185, 205, .4);
            border-radius: 28px;
            box-shadow: inset 0 2px 0 var(--shine), inset 1px 0 0 rgba(255, 255, 255, .26),
                0 24px 64px rgba(232, 85, 109, .18), 0 48px 80px rgba(42, 18, 24, .08);
        }

        #menu::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .9), transparent);
        }

        .logo-heart {
            font-size: 3.8rem;
            animation: beat 1.5s ease-in-out infinite;
            display: block;
            margin-bottom: 8px;
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.12)
            }
        }

        #menu h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2rem;
            color: var(--rose-deep);
            text-shadow: 0 2px 18px rgba(232, 85, 109, .2);
            margin: 8px 0 4px;
        }

        #menu .sub {
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: var(--muted);
            margin-bottom: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 11px;
            margin: 16px 0;
        }

        .stat-card {
            background: rgba(255, 240, 245, .45);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 85, 109, .2);
            border-radius: 16px;
            padding: 13px 10px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .65);
        }

        .stat-label {
            font-size: .8rem;
            color: var(--muted);
            display: block;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--rose);
            text-shadow: 0 2px 8px rgba(232, 85, 109, .28);
            display: block;
        }

        .rules {
            background: rgba(255, 240, 245, .38);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 85, 109, .18);
            border-radius: 18px;
            padding: 16px;
            margin: 14px 0;
            text-align: right;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .6);
        }

        .rules h3 {
            font-family: 'Aref Ruqaa', serif;
            color: var(--rose);
            margin-bottom: 11px;
            font-size: 1.05rem;
        }

        .rule-row {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 10px;
            border-radius: 11px;
            background: rgba(255, 240, 245, .42);
            border: 1px solid rgba(232, 85, 109, .13);
            margin-bottom: 6px;
            font-size: .9rem;
            color: #4a2830;
        }

        .rule-row:last-child {
            margin-bottom: 0;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.15rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            color: white;
            border: 1px solid rgba(255, 150, 170, .4);
            border-radius: 99px;
            margin: 16px 0 10px;
            background: linear-gradient(135deg, rgba(232, 85, 109, .88), rgba(200, 53, 85, .92));
            backdrop-filter: blur(10px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .28), 0 8px 28px rgba(232, 85, 109, .42);
            transition: all .25s;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .38), 0 14px 36px rgba(232, 85, 109, .52);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: inline-block;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            color: var(--rose-deep);
            text-decoration: none;
            padding: 11px 22px;
            background: rgba(255, 240, 245, .38);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 85, 109, .26);
            border-radius: 99px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .62);
            transition: all .25s;
        }

        .back-link:hover {
            background: rgba(255, 240, 245, .62);
            transform: translateX(-4px);
        }

        /* ─ HUD ─ */
        #hud {
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .hud-side {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .hud-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 10px 15px;
            border-radius: 99px;
            font-size: 1rem;
            font-weight: 700;
            background: rgba(255, 240, 245, .38);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(232, 85, 109, .26);
            color: var(--ink);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .65), 0 3px 12px rgba(232, 85, 109, .1);
            min-width: 72px;
            justify-content: center;
            transition: box-shadow .3s, border-color .3s;
        }

        .hud-pill.hot {
            border-color: rgba(232, 85, 109, .5);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .65), 0 0 18px rgba(232, 85, 109, .38);
        }

        #timer-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 240, 245, .35);
            backdrop-filter: blur(14px);
            border: 2.5px solid rgba(232, 85, 109, .4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--rose-deep);
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, .68), 0 4px 18px rgba(232, 85, 109, .22);
            transition: border-color .3s, box-shadow .3s;
        }

        #timer-ring.urgent {
            border-color: var(--rose);
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, .68), 0 0 22px rgba(232, 85, 109, .55);
            animation: beat .5s infinite;
        }

        #pause-btn {
            background: rgba(255, 240, 245, .38);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 85, 109, .28);
            border-radius: 50%;
            color: var(--rose-deep);
            font-size: 1.1rem;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .62);
            transition: all .2s;
        }

        #pause-btn:hover {
            background: rgba(255, 240, 245, .62);
            transform: scale(1.1);
        }

        /* ─ PROGRESS ─ */
        #prog-wrap {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: min(300px, 78vw);
            z-index: 50;
        }

        #prog-label {
            font-size: .8rem;
            color: var(--muted);
            font-weight: 600;
            text-align: center;
            margin-bottom: 5px;
        }

        #prog-track {
            height: 8px;
            background: rgba(255, 200, 215, .3);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(232, 85, 109, .18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .5);
        }

        #prog-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width .35s ease;
            background: linear-gradient(90deg, var(--rose-lt), var(--rose));
            box-shadow: 0 0 8px rgba(232, 85, 109, .38);
        }

        /* ─ ARENA ─ */
        #arena {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        /* ─ HEARTS ─ */
        .fheart {
            position: absolute;
            top: -70px;
            font-size: 2.4rem;
            user-select: none;
            -webkit-user-select: none;
            z-index: 20;
            pointer-events: auto;
            filter: drop-shadow(0 3px 8px rgba(232, 85, 109, .32));
            transition: filter .12s, transform .12s;
            will-change: transform, top;
        }

        .fheart.special {
            animation: sparkle .7s infinite alternate;
        }

        .fheart.near {
            filter: drop-shadow(0 0 18px rgba(232, 85, 109, .95)) drop-shadow(0 3px 8px rgba(232, 85, 109, .4));
            transform: scale(1.28) rotate(-8deg);
        }

        .fheart.popped {
            transform: scale(0.7);
            filter: drop-shadow(0 0 24px rgba(232, 85, 109, 1));
        }

        @keyframes sparkle {
            0% {
                filter: drop-shadow(0 0 10px rgba(232, 85, 109, .7)) hue-rotate(0deg)
            }

            100% {
                filter: drop-shadow(0 0 22px rgba(232, 85, 109, .95)) hue-rotate(40deg)
            }
        }

        .powerup {
            animation: powerPulse 1s infinite;
            filter: drop-shadow(0 0 14px rgba(232, 85, 109, .6));
        }

        @keyframes powerPulse {

            0%,
            100% {
                transform: scale(1) rotate(0deg)
            }

            50% {
                transform: scale(1.2) rotate(180deg)
            }
        }

        /* ─ EFFECTS ─ */
        .score-pop {
            position: fixed;
            pointer-events: none;
            font-weight: 900;
            z-index: 1500;
            font-family: 'Tajawal', sans-serif;
            transform: translate(-50%, -50%);
            animation: scorePop 1.1s forwards;
        }

        @keyframes scorePop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -110%) scale(1.9)
            }
        }

        .combo-burst {
            position: fixed;
            pointer-events: none;
            z-index: 1600;
            font-size: 1.45rem;
            font-weight: 900;
            color: var(--rose);
            text-shadow: 0 2px 12px rgba(232, 85, 109, .6);
            font-family: 'Tajawal', sans-serif;
            animation: comboBurst 1.4s forwards;
        }

        @keyframes comboBurst {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(.4)
            }

            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.15)
            }

            70% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -70%) scale(.8)
            }
        }

        .power-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 240, 245, .55);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(232, 85, 109, .35);
            border-radius: 99px;
            padding: 16px 36px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--rose-deep);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7), 0 12px 36px rgba(232, 85, 109, .28);
            pointer-events: none;
            z-index: 2000;
            animation: msgPop 2.4s forwards;
        }

        @keyframes msgPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(.8)
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.04)
            }

            20%,
            75% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -60%) scale(.95)
            }
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1400;
            animation: particleFly var(--d) ease-out forwards;
            transform: translate(-50%, -50%);
        }

        @keyframes particleFly {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0)
            }
        }

        /* ─ PAUSE ─ */
        #pause-overlay {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: rgba(255, 215, 225, .18);
            backdrop-filter: blur(22px) saturate(1.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pause-box {
            background: rgba(255, 240, 245, .4);
            backdrop-filter: blur(24px) saturate(1.7);
            border: 1px solid rgba(255, 185, 205, .44);
            border-radius: 26px;
            padding: 42px 34px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: inset 0 2px 0 var(--shine), 0 24px 56px rgba(232, 85, 109, .18);
        }

        #pause-box h2 {
            font-family: 'Aref Ruqaa', serif;
            color: var(--rose);
            font-size: 1.9rem;
            margin-bottom: 18px;
        }

        #pause-box p {
            font-size: 1.1rem;
            color: #4a2830;
            margin: 8px 0;
        }

        .pbtn-row {
            display: flex;
            gap: 11px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .pbtn {
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            padding: 13px 20px;
            border-radius: 99px;
            border: 1px solid rgba(255, 150, 170, .38);
            background: linear-gradient(135deg, rgba(232, 85, 109, .85), rgba(200, 53, 85, .9));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .28), 0 5px 18px rgba(232, 85, 109, .35);
            transition: all .22s;
        }

        .pbtn:hover {
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .38), 0 9px 26px rgba(232, 85, 109, .48);
        }

        .pbtn.ghost {
            background: rgba(255, 240, 245, .42);
            color: var(--rose-deep);
            border: 1px solid rgba(232, 85, 109, .28);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .65);
        }

        /* ─ RESULT ─ */
        #result-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 420px;
            padding: 38px 28px;
            text-align: center;
            z-index: 100;
            background: rgba(255, 240, 245, .38);
            backdrop-filter: blur(26px) saturate(1.8);
            border: 1px solid rgba(255, 185, 205, .42);
            border-radius: 28px;
            box-shadow: inset 0 2px 0 var(--shine), 0 28px 70px rgba(232, 85, 109, .2);
        }

        #result-box h2 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2rem;
            color: var(--rose);
            margin-bottom: 14px;
        }

        .result-stats {
            background: rgba(255, 240, 245, .5);
            border: 1px solid rgba(232, 85, 109, .22);
            border-radius: 18px;
            padding: 20px;
            margin: 18px 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .68);
        }

        .result-stats p {
            font-size: 1.1rem;
            color: #4a2830;
            margin: 8px 0;
        }

        .result-msg {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: var(--rose-deep);
            margin: 16px 0;
        }

        .result-btns {
            display: flex;
            gap: 11px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* ─ TOUCH HINT ─ */
        #touch-hint {
            position: absolute;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            font-size: .8rem;
            color: var(--muted);
            z-index: 50;
            background: rgba(255, 240, 245, .42);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 85, 109, .2);
            border-radius: 99px;
            padding: 6px 15px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .6);
            opacity: 0;
            animation: fadeInOut 3.5s 1.5s forwards;
            white-space: nowrap;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0
            }

            15% {
                opacity: 1
            }

            80% {
                opacity: 1
            }

            100% {
                opacity: 0
            }
        }

        /* ─ RESPONSIVE ─ */
        @media(max-width:480px) {
            .hud-pill {
                padding: 8px 12px;
                font-size: .88rem;
                min-width: 62px;
            }

            #timer-ring {
                width: 60px;
                height: 60px;
                font-size: 1.4rem;
            }

            .fheart {
                font-size: 2rem;
            }

            #menu {
                padding: 24px 16px;
            }

            #menu h1 {
                font-size: 1.75rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }
    </style>
</head>

<body>

    <div id="cur-dot"></div>
    <div id="cur-ring"></div>

    <div id="game-wrap">

        <!-- ══ MENU ══ -->
        <div id="menu">
            <span class="logo-heart">💖</span>
            <h1>صائد القلوب</h1>
            <p class="sub">لعبة مخصصة لرحمة من محمد ❤️</p>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">أعلى نقاط</span><span class="stat-value"
                        id="best-score">0</span></div>
                <div class="stat-card"><span class="stat-label">أعلى مستوى</span><span class="stat-value"
                        id="best-level">1</span></div>
                <div class="stat-card"><span class="stat-label">عدد الجولات</span><span class="stat-value"
                        id="total-games">0</span></div>
                <div class="stat-card"><span class="stat-label">آخر لعبة</span><span class="stat-value"
                        id="last-played">-</span></div>
            </div>
            <div class="rules">
                <h3>🎯 قواعد اللعب</h3>
                <div class="rule-row"><span>❤️</span><span>قلب عادي = نقطة</span></div>
                <div class="rule-row"><span>💖</span><span>قلب ملون = 3 نقاط</span></div>
                <div class="rule-row"><span>⭐</span><span>نجمة = بونص خاص</span></div>
                <div class="rule-row"><span>🔥</span><span>كومبو ×5 = مضاعفة</span></div>
            </div>
            <button class="start-btn" id="start-btn">🎮 ابدأ اللعبة</button>
            <a href="../index.html" class="back-link">← الرئيسية</a>
        </div>

        <!-- ══ GAME ══ -->
        <div id="game-screen" style="display:none;position:absolute;inset:0;">
            <div id="hud">
                <div class="hud-side">
                    <div class="hud-pill">🏆 <span id="score">0</span></div>
                    <div class="hud-pill">🎯 <span id="level">1</span></div>
                </div>
                <div id="timer-ring"><span id="timer">30</span></div>
                <div class="hud-side">
                    <div class="hud-pill" id="combo-pill">🔥 <span id="combo">0</span></div>
                    <button id="pause-btn">⏸️</button>
                </div>
            </div>
            <div id="arena"></div>
            <div id="prog-wrap">
                <div id="prog-label">المستوى التالي</div>
                <div id="prog-track">
                    <div id="prog-fill"></div>
                </div>
            </div>
            <div id="touch-hint">👆 المسي القلوب قبل ما تطير!</div>
        </div>

        <!-- ══ PAUSE ══ -->
        <div id="pause-overlay" style="display:none;">
            <div id="pause-box">
                <h2>⏸️ متوقف</h2>
                <p>النقاط: <strong id="p-score">0</strong></p>
                <p>المستوى: <strong id="p-level">1</strong></p>
                <p>الكومبو: <strong id="p-combo">0</strong></p>
                <div class="pbtn-row">
                    <button class="pbtn" id="resume-btn">▶️ متابعة</button>
                    <button class="pbtn" id="restart-btn">🔄 إعادة</button>
                    <button class="pbtn ghost" id="quit-btn">🚪 خروج</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const $ = id => document.getElementById(id);
        const isMobile = ('ontouchstart' in window) || window.matchMedia('(hover:none)').matches;

        /* ── CURSOR ── */
        let cx = -100, cy = -100, tx = -100, ty = -100;
        const dot = document.getElementById('cur-dot'), ring = document.getElementById('cur-ring');

        if (!isMobile) {
            document.addEventListener('mousemove', e => {
                cx = e.clientX; cy = e.clientY;
                dot.style.left = cx + 'px'; dot.style.top = cy + 'px';
            });
            (function loop() {
                tx += (cx - tx) * .13; ty += (cy - ty) * .13;
                ring.style.left = tx + 'px'; ring.style.top = ty + 'px';
                requestAnimationFrame(loop);
            })();

            /* attraction check */
            setInterval(() => {
                if (!gs.gameActive) return;
                let near = false;
                document.querySelectorAll('.fheart').forEach(h => {
                    const r = h.getBoundingClientRect();
                    const dist = Math.hypot(cx - (r.left + r.width / 2), cy - (r.top + r.height / 2));
                    h.classList.toggle('near', dist < 90);
                    if (dist < 90) near = true;
                });
                dot.classList.toggle('attract', near);
                ring.classList.toggle('attract', near);
            }, 40);
        }

        /* ── STATE ── */
        let gs = {};
        let timerId, heartId, powerUpId;

        /* ── STORAGE ── */
        function loadData() {
            const d = JSON.parse(localStorage.getItem('hcg2') || '{}');
            $('best-score').textContent = d.best || 0;
            $('best-level').textContent = d.lvl || 1;
            $('total-games').textContent = d.total || 0;
            if (d.ts) {
                const diff = Math.floor((Date.now() - d.ts) / 86400000);
                $('last-played').textContent = diff === 0 ? 'اليوم' : diff === 1 ? 'أمس' : diff + ' أيام';
            }
        }
        function saveData() {
            const d = JSON.parse(localStorage.getItem('hcg2') || '{}');
            d.best = Math.max(d.best || 0, gs.score);
            d.lvl = Math.max(d.lvl || 1, gs.level);
            d.total = (d.total || 0) + 1; d.ts = Date.now();
            localStorage.setItem('hcg2', JSON.stringify(d));
        }

        /* ── START ── */
        function hInterval() { return Math.max(520, 1060 - gs.level * 58); }
        function startGame() {
            $('menu').style.display = 'none';
            $('game-screen').style.display = 'block';
            const rb = $('result-box'); if (rb) rb.remove();
            $('timer-ring').classList.remove('urgent');
            gs = { score: 0, timeLeft: 30, level: 1, combo: 0, maxCombo: 0, gameActive: true, isPaused: false };
            updateHUD(); updateProg();
            timerId = setInterval(tick, 1000);
            heartId = setInterval(spawnHeart, hInterval());
            powerUpId = setInterval(spawnPowerUp, 9000);
        }

        /* ── HEARTS ── */
        function spawnHeart() {
            if (!gs.gameActive || gs.isPaused) return;
            const special = Math.random() < 0.25;
            const h = document.createElement('div');
            h.className = 'fheart' + (special ? ' special' : '');
            h.textContent = special ? '💖' : '❤️';
            h.dataset.val = special ? 3 : 1;
            h.style.left = Math.random() * (window.innerWidth - 55) + 'px';
            h.addEventListener('touchstart', e => { e.preventDefault(); collectHeart(h); }, { passive: false });
            h.addEventListener('click', () => collectHeart(h));
            $('arena').appendChild(h); fall(h);
        }

        const PUPS = ['⭐', '🌟', '✨', '🔥', '⚡'];
        function spawnPowerUp() {
            if (!gs.gameActive || gs.isPaused || Math.random() > .58) return;
            const type = PUPS[Math.floor(Math.random() * PUPS.length)];
            const p = document.createElement('div');
            p.className = 'fheart powerup'; p.textContent = type;
            p.style.left = Math.random() * (window.innerWidth - 55) + 'px';
            p.style.fontSize = '2.6rem';
            p.addEventListener('touchstart', e => { e.preventDefault(); collectPowerUp(p, type); }, { passive: false });
            p.addEventListener('click', () => collectPowerUp(p, type));
            $('arena').appendChild(p); fall(p);
        }

        /* ── FALL (smooth sway) ── */
        function fall(el) {
            let pos = -70;
            const spd = 1.8 + gs.level * .28;
            const startX = parseFloat(el.style.left);
            const phase = Math.random() * Math.PI * 2;
            const amp = isMobile ? 8 : 12;

            function step() {
                if (!el.parentNode) return;
                if (gs.isPaused) { requestAnimationFrame(step); return; }
                pos += spd;
                el.style.top = pos + 'px';
                el.style.left = (startX + Math.sin(pos * .018 + phase) * amp) + 'px';
                if (pos > window.innerHeight + 20) {
                    el.remove();
                    if (el.dataset.val) { gs.combo = 0; updateHUD(); }
                    return;
                }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        /* ── COLLECT ── */
        function collectHeart(h) {
            if (!h.parentNode || !gs.gameActive) return;
            const val = parseInt(h.dataset.val);
            const multi = gs.combo >= 5 ? 2 : 1;
            const pts = val * multi;
            gs.score += pts; gs.combo++;
            if (gs.combo > gs.maxCombo) gs.maxCombo = gs.combo;

            const r = h.getBoundingClientRect();
            const px = r.left + r.width / 2, py = r.top + r.height / 2;
            h.classList.add('popped');
            setTimeout(() => h.remove(), 80);

            spawnScorePop(px, py, '+' + pts, val > 1 ? '#e8556d' : '#c03558');
            spawnParticles(px, py);
            if (gs.combo % 5 === 0 && gs.combo > 0) spawnComboBurst(px, py);

            updateHUD();
            if (gs.score >= gs.level * 30) levelUp();
            updateProg();
        }

        function collectPowerUp(p, type) {
            if (!p.parentNode) return; p.remove();
            let msg = '';
            switch (type) {
                case '⭐': case '🌟': gs.timeLeft += 5; msg = '+5 ثواني! ⭐'; break;
                case '✨': gs.timeLeft += 8; msg = '+8 ثواني! ✨'; break;
                case '🔥': gs.combo += 3; msg = 'كومبو مجاني! 🔥'; break;
                case '⚡': gs.score += 10; msg = '+10 نقاط! ⚡'; break;
            }
            showMsg(msg); updateHUD();
        }

        /* ── TICK ── */
        function tick() {
            gs.timeLeft--; updateHUD();
            if (gs.timeLeft <= 5) $('timer-ring').classList.add('urgent');
            if (gs.timeLeft <= 0) endGame();
        }

        function levelUp() {
            gs.level++; updateHUD(); showMsg('المستوى ' + gs.level + '! 🎉');
            clearInterval(heartId); heartId = setInterval(spawnHeart, hInterval());
        }

        /* ── HUD ── */
        function updateHUD() {
            $('score').textContent = gs.score; $('timer').textContent = gs.timeLeft;
            $('level').textContent = gs.level; $('combo').textContent = gs.combo;
            $('combo-pill').classList.toggle('hot', gs.combo >= 5);
        }
        function updateProg() {
            $('prog-fill').style.width = ((gs.score % (gs.level * 30)) / (gs.level * 30) * 100) + '%';
        }

        /* ── PAUSE ── */
        function pauseGame() {
            if (!gs.gameActive || gs.isPaused) return;
            gs.isPaused = true; clearAllIntervals();
            $('p-score').textContent = gs.score;
            $('p-level').textContent = gs.level;
            $('p-combo').textContent = gs.combo;
            $('pause-overlay').style.display = 'flex';
        }
        function resumeGame() {
            gs.isPaused = false; $('pause-overlay').style.display = 'none';
            timerId = setInterval(tick, 1000);
            heartId = setInterval(spawnHeart, hInterval());
            powerUpId = setInterval(spawnPowerUp, 9000);
        }
        function restartGame() {
            $('pause-overlay').style.display = 'none';
            clearAllIntervals(); clearArena();
            const rb = $('result-box'); if (rb) rb.remove();
            $('timer-ring').classList.remove('urgent');
            startGame();
        }
        function quitGame() { $('pause-overlay').style.display = 'none'; endGame(); }
        function clearAllIntervals() { clearInterval(timerId); clearInterval(heartId); clearInterval(powerUpId); }
        function clearArena() { document.querySelectorAll('.fheart').forEach(h => h.remove()); }

        /* ── END ── */
        function endGame() {
            gs.gameActive = false; clearAllIntervals(); clearArena(); saveData();
            $('timer-ring').classList.remove('urgent');
            const s = gs.score;
            let msg = '', emoji = '';
            if (s >= 300) { msg = 'أسطورة! إنتِ ملكة القلوب! 👑'; emoji = '👑'; }
            else if (s >= 200) { msg = 'ممتاز! صائدة قلوب محترفة! 🏆'; emoji = '🏆'; }
            else if (s >= 120) { msg = 'رائع! صائدة قلوب ماهرة! 💖'; emoji = '💖'; }
            else if (s >= 60) { msg = 'جيد جداً! 💕'; emoji = '💕'; }
            else { msg = 'حاولي تاني! بحبك محمد 💝'; emoji = '💝'; }

            const box = document.createElement('div');
            box.id = 'result-box';
            box.innerHTML = `
    <div style="font-size:3.5rem;margin-bottom:12px">${emoji}</div>
    <h2>انتهت اللعبة!</h2>
    <div class="result-stats">
      <p>🏆 النقاط: <strong>${gs.score}</strong></p>
      <p>🎯 المستوى: <strong>${gs.level}</strong></p>
      <p>🔥 أعلى كومبو: <strong>${gs.maxCombo}</strong></p>
    </div>
    <p class="result-msg">${msg}</p>
    <div class="result-btns">
      <button class="pbtn" onclick="restartGame()">🔄 العب تاني</button>
      <button class="pbtn" onclick="shareScore()">📱 شارك</button>
      <a href="../index.html" class="pbtn ghost" style="text-decoration:none;display:inline-flex;align-items:center;">🏠 الرئيسية</a>
    </div>
  `;
            $('game-screen').appendChild(box);
        }

        function shareScore() {
            const t = `💖 حققت ${gs.score} نقطة في صائد القلوب!\n🎯 المستوى ${gs.level} · 🔥 كومبو ${gs.maxCombo}\n\n💕 لعبة مخصصة لرحمة من محمد`;
            navigator.share ? navigator.share({ title: '💖 صائد القلوب', text: t })
                : navigator.clipboard?.writeText(t).then(() => showMsg('تم النسخ! 📋'));
        }

        /* ── VISUAL FX ── */
        function spawnScorePop(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'score-pop';
            el.textContent = text;
            el.style.cssText = `left:${x}px;top:${y}px;color:${color};font-size:1.9rem;`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1100);
        }
        function spawnComboBurst(x, y) {
            const el = document.createElement('div');
            el.className = 'combo-burst';
            el.textContent = '🔥 COMBO ×' + Math.floor(gs.combo / 5);
            el.style.cssText = `left:${x}px;top:${y}px;`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1400);
        }
        function spawnParticles(x, y) {
            const cols = ['#e8556d', '#f7a3b0', '#c03558', '#ffd6e0', '#fff0f5'];
            for (let i = 0; i < 9; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const a = (i / 9) * Math.PI * 2, d = 30 + Math.random() * 45;
                p.style.cssText = `left:${x}px;top:${y}px;width:${4 + Math.random() * 5}px;height:${4 + Math.random() * 5}px;background:${cols[Math.floor(Math.random() * cols.length)]};--tx:${Math.cos(a) * d}px;--ty:${Math.sin(a) * d}px;--d:${.4 + Math.random() * .4}s;`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 900);
            }
        }
        function showMsg(text) {
            const el = document.createElement('div');
            el.className = 'power-msg'; el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2400);
        }

        /* ── INIT ── */
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            $('start-btn').onclick = startGame;
            $('pause-btn').onclick = pauseGame;
            $('resume-btn').onclick = resumeGame;
            $('restart-btn').onclick = restartGame;
            $('quit-btn').onclick = quitGame;
            document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        });
    </script>
</body>

</html>
