<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ذكرياتنا - رحمة ❤️</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="custom-cursor"></div>
  <div id="cursor-trail"></div>
  <div class="container">
    <a href="../index.html" class="back-btn">← العودة للرئيسية</a>
    <h1>💖 ذكرياتنا الجميلة</h1>
    <div id="memory-lane-container">
      <div class="memory-card">
        <div class="memory-img-placeholder">
          <div id="memory-emoji" style="font-size:3rem;margin-bottom:8px;">💫</div>
        </div>
        <p class="memory-caption"></p>
        <p id="memory-counter" style="font-size:.85rem;color:var(--muted);margin-top:6px;"></p>
      </div>
      <div class="memory-nav">
        <button id="prev-memory-btn">← السابق</button>
        <button id="like-memory-btn">💖 أحبها</button>
        <button id="next-memory-btn">التالي →</button>
      </div>
      <div style="text-align:center;margin-top:12px;">
        <button id="share-memory-btn" class="message-btn" style="font-size:.9rem;padding:10px 22px;">
          شاركي الذكرى في تيليجرام 📤
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/components/telegram.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/components/floating-hearts.js"></script>
  <script src="../assets/js/components/cursor.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/memories.js"></script>
</body>
</html>
